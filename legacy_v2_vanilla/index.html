<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Where Music Meets Moments - Mayuri Music</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cormorant+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
    @font-face {
      font-family: 'Bigra';
      src: url('Assests/Bigra.ttf') format('truetype');
      font-display: swap;
    }
    </style>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- MODIFICATION 3 - Page-wide Vignette -->
    <div class="vignette"></div>

    <!-- Custom Cursor -->
    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>

    <!-- Zari side panels -->
    <img class="zari zari-left"  src="Assests/zari.png" alt="">
    <img class="zari zari-right" src="Assests/zari.png" alt="">

    <!-- Navbar -->
    <nav class="navbar">
      <span class="brand">Mayuri Music</span>
      <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">Our Band</a></li>
        <li><a href="#">Sounds</a></li>
        <li><a href="#">Events</a></li>
        <li><a href="#">Media</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
      <button class="book-btn">Book Now</button>
    </nav>

    <!-- Hero section structure -->
    <section class="hero">
      <div class="chakra-wrap">
        <div class="glow-outer"></div>
        <div class="glow-inner"></div>
        <div class="rays-wrap" id="rays"></div>
        <img id="chakra" src="Assests/chakra.png" alt="chakra" draggable="false">
      </div>
      <div class="hero-text">
        <h1 class="hero-headline">Where Music Meets Moments</h1>
        <p class="hero-sub">Curating Exquisite Melodies For Your Unforgettable Day</p>
        <a href="#" class="hero-cta">Explore Our Legacy ↗</a>
      </div>
    </section>

    <!-- External script -->
    <script src="script.js"></script>
</body>
</html>
